<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Neefoon - Real-Time Air Quality & AQI App</title>
    <meta name="description" content="Neefoon brings real-time AQI, fire hotspot maps, and station-level pollutant data to your pocket. Free, no ads, no signup. Thailand, Southeast Asia, and worldwide coverage." />
    <link rel="canonical" href="https://www.neefoon.com/" />

    <!-- Open Graph – controls how links look when shared on social media or messaging apps -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.neefoon.com/" />
    <meta property="og:title"       content="Neefoon - Real-Time Air Quality & AQI App" />
    <meta property="og:description" content="Real-time AQI, fire hotspot maps, and pollutant data for Thailand, Southeast Asia, and worldwide. Free, no ads, no signup." />
    <!--
      og:image should be a 1200×630 px PNG/JPG saved to /public/og-image.png.
      Social platforms cache this image, so update the filename whenever you change the design.
    -->
    <meta property="og:image"       content="https://www.neefoon.com/og-image.jpg" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Neefoon - Real-Time Air Quality & AQI App" />
    <meta name="twitter:description" content="Real-time AQI, fire hotspot maps, and pollutant data for Thailand, Southeast Asia, and worldwide. Free, no ads, no signup." />
    <meta name="twitter:image"       content="https://www.neefoon.com/og-image.jpg" />

    <!--
      JSON-LD structured data — machine-readable info for Google.
      "SoftwareApplication" tells Google this site is about a downloadable app,
      which can unlock rich results (price, rating, platform) in search.
      Update "downloadUrl" values once the App Store / Play Store links are live.
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Neefoon",
      "description": "Real-time AQI, fire hotspot maps, and station-level pollutant data for Thailand, Southeast Asia, and worldwide. Free, no ads, no signup.",
      "url": "https://www.neefoon.com",
      "image": "https://www.neefoon.com/og-image.jpg",
      "applicationCategory": "HealthApplication",
      "operatingSystem": ["iOS", "Android"],
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "Neefoon",
        "url": "https://www.neefoon.com"
      }
    }
    </script>

    <!-- Preconnect speeds up the Google Fonts handshake -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sarabun:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
